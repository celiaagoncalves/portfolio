<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0c14"/>
  
  <!-- Purple accent bar (left) -->
  <rect width="8" height="630" fill="#8b5cf6"/>
  
  <!-- Geometric accent elements -->
  <circle cx="1050" cy="100" r="60" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="150" cy="550" r="80" fill="#8b5cf6" opacity="0.08"/>
  
  <!-- Main content area -->
  <g>
    <!-- Blog icon -->
    <rect x="100" y="120" width="280" height="390" fill="none" stroke="#8b5cf6" stroke-width="2" rx="4" opacity="0.3"/>
    
    <!-- Dots representing text lines -->
    <rect x="130" y="160" width="220" height="8" fill="#8b5cf6" rx="2"/>
    <rect x="130" y="190" width="200" height="6" fill="#ffffff" opacity="0.6" rx="2"/>
    <rect x="130" y="220" width="180" height="6" fill="#ffffff" opacity="0.6" rx="2"/>
    
    <rect x="130" y="280" width="220" height="6" fill="#ffffff" opacity="0.5" rx="2"/>
    <rect x="130" y="300" width="220" height="6" fill="#ffffff" opacity="0.5" rx="2"/>
    <rect x="130" y="320" width="200" height="6" fill="#ffffff" opacity="0.5" rx="2"/>
    <rect x="130" y="340" width="150" height="6" fill="#ffffff" opacity="0.5" rx="2"/>
    
    <!-- Main text -->
    <text x="450" y="220" font-family="Inter, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">
      Blog
    </text>
    
    <!-- Subtitle -->
    <text x="450" y="300" font-family="Inter, sans-serif" font-size="36" font-weight="300" fill="#8b5cf6">
      Product Ownership
    </text>
    <text x="450" y="350" font-family="Inter, sans-serif" font-size="36" font-weight="300" fill="#8b5cf6">
      Quality &amp; Systems
    </text>
    
    <!-- Author/URL at bottom -->
    <text x="450" y="520" font-family="Inter, sans-serif" font-size="18" fill="#ffffff" opacity="0.7">
      celiaagoncalves.github.io
    </text>
  </g>
  
  <!-- Bottom accent line -->
  <rect y="622" width="1200" height="8" fill="#8b5cf6" opacity="0.2"/>
</svg>